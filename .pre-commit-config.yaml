# ─── Pre-commit Configuration ──────────────────────────────────────────────
# Standards: PEP8 (Ruff + Black), TypeScript (Prettier + ESLint)
# Install: pre-commit install --install-hooks
# Run manually: pre-commit run --all-files

repos:
  # ── General ──────────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: .devcontainer|.claude|.agent
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # ── Python: Ruff (formatter + linter + import sort) ──────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args:
          - --ignore-words-list=the
          - --quiet-level=2
        exclude_types: [csv, json, yaml]
        exclude: ./.*|.devcontainer|.claude|.agent|.pre-commit-config.yaml|client_config_es.html|client_config_fr.html|README.md

  # ── TypeScript / Angular: Prettier ───────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        args: ["--print-width=120"]
        types_or: [javascript, html, css, scss, json, yaml, markdown]
        exclude: "^(backend/|node_modules/)"
