# ─── Development environment for FastAPI + Angular ─────────────────────────
# Usage: automatically started by VS Code Dev Containers
# Ports: 8000 (API), 4200 (Frontend)

services:
  # ── FastAPI backend ─────────────────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace
    command: sleep infinity # VS Code takes over
    environment:
      - SECRET_KEY=dev-secret-key-change-in-production
      - ENVIRONMENT=development
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
    ports:
      - "8000:8000"
    networks:
      - devnet

# ─── Networks ───────────────────────────────────────────────────────────────
networks:
  devnet:
    driver: bridge
