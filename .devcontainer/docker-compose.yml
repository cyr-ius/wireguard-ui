# ─── Development environment for FastAPI + Angular ─────────────────────────
services:
  # ── FastAPI backend ─────────────────────────────────────────────────────
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
      - /data # named volume for persistent data
    working_dir: /workspace
    command: sleep infinity # VS Code takes over
    cap_add:
      - NET_ADMIN # required for wireguard-tools

volumes:
  data:
