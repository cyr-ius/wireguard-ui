<!-- Smtp configuration page - admin only -->
<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-title">
        <i class="bi bi-hdd-stack-fill me-2"></i>Smtp Configuration
      </h1>
      <p class="page-subtitle">SMTP interface settings</p>
    </div>
    <!-- Service controls -->
    <div class="service-controls">
      <button
        class="btn btn-sm btn-outline-success"
        (click)="controlService('test')"
      >
        <i class="bi bi-send-fill me-1"></i>Test
      </button>
    </div>
  </div>

  @if (error()) {
    <div class="alert alert-danger">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error() }}
    </div>
  }
  @if (saveError()) {
    <div class="alert alert-danger">
      <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ saveError() }}
    </div>
  }
  @if (successMessage()) {
    <div class="alert alert-success">
      <i class="bi bi-check-circle-fill me-2"></i>{{ successMessage() }}
    </div>
  }
  @if (loading()) {
    <div class="loading-state">
      <div class="spinner-border text-primary" role="status"></div>
      <p>Loading configuration...</p>
    </div>
  } @else {
    <form (submit)="onSubmit($event)" class="config-form">
      <div class="config-card">
        <h2 class="section-title"><i class="bi bi-ethernet me-2"></i>Server</h2>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label"><i class="bi bi-server"></i>Server</label>
            <input
              type="text"
              class="form-control"
              [formField]="smtpForm.smtp_server"
              placeholder="smtp.example.com"
            />
          </div>
          <div class="form-group">
            <label class="form-label"><i class="bi bi-server"></i>Port</label>
            <input
              type="number"
              class="form-control"
              [formField]="smtpForm.smtp_port"
              placeholder="25"
            />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label"
              ><i class="bi bi-server"></i>Username</label
            >
            <input
              type="text"
              class="form-control"
              [formField]="smtpForm.smtp_username"
              placeholder="username"
            />
          </div>
          <div class="form-group">
            <label class="form-label"
              ><i class="bi bi-server"></i>Password</label
            >
            <input
              type="password"
              class="form-control"
              [formField]="smtpForm.smtp_password"
            />
          </div>
        </div>
        <div class="form-row mb-3">
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              [formField]="smtpForm.smtp_tls"
            />
            <label class="form-check-label" for="checkDefault"> TLS </label>
          </div>
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              [formField]="smtpForm.smtp_ssl"
            />
            <label class="form-check-label" for="checkDefault"> SSL </label>
          </div>
          <div class="form-check">
            <input
              class="form-check-input"
              type="checkbox"
              [formField]="smtpForm.smtp_verify"
            />
            <label class="form-check-label" for="checkDefault">
              Verify (SSL/TLS)
            </label>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label"
              ><i class="bi bi-server"></i>Mail Form</label
            >
            <input
              type="text"
              class="form-control"
              [formField]="smtpForm.smtp_from"
              placeholder="no-reply@wireguard.local"
            />
          </div>
          <div class="form-group">
            <label class="form-label"
              ><i class="bi bi-server"></i>Mail name</label
            >
            <input
              type="text"
              class="form-control"
              [formField]="smtpForm.smtp_from_name"
              placeholder="Wireguard UI"
            />
          </div>
        </div>
      </div>
      <div class="form-actions">
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="smtpForm().invalid()"
          [aria-busy]="smtpForm().submitting()"
        >
          @if (smtpForm().submitting()) {
            <span class="spinner-border spinner-border-sm me-1"></span>
          }
          <i class="bi bi-floppy me-1"></i>Save Configuration
        </button>
        <button
          type="reset"
          class="btn btn-danger"
          (click)="cleanConfig()"
          [disabled]="smtpForm().submitting()"
          [aria-busy]="smtpForm().submitting()"
        >
          <i class="bi bi-trash3 me-1"></i>Clean Configuration
        </button>
      </div>
    </form>
  }
</div>
