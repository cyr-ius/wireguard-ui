<div class="oidc-callback-page">
  <div class="callback-card">
    @if (error()) {
      <div-error [errorRef]="error()"></div-error>
      <a class="btn-back" routerLink="/login">Back to login</a>
    } @else {
      <div class="spinner"></div>
      <h2>Signing you in...</h2>
      <p>Completing OIDC authentication.</p>
    }
  </div>
</div>
