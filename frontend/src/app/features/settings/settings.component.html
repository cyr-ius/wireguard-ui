<!-- Global settings page - admin only -->
<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-title"><i class="bi bi-gear-fill me-2"></i>Global Settings</h1>
      <p class="page-subtitle">Application and VPN network configuration</p>
    </div>
  </div>

  <div-error [errorRef]="error()" [successRef]="successMessage()"></div-error>
  @if (loading()) {
    <div class="loading-state">
      <div class="spinner-border text-primary" role="status"></div>
      <p>Loading...</p>
    </div>
  } @else {
    <form [formRoot]="settingsForm" class="config-form">
      <div class="config-card">
        <h2 class="section-title"><i class="bi bi-globe me-2" class="form-error"></i>Network</h2>
        <div class="form-group">
          <label class="form-label">Endpoint Address *</label>
          <input
            type="text"
            class="form-control"
            [class.is-warning]="!settingsForm.endpoint_address().value().trim()"
            [formField]="settingsForm.endpoint_address"
            placeholder="vpn.yourdomain.com or public IP"
          />
          <form-extra-fields [fieldRef]="settingsForm.endpoint_address" class="form-error"></form-extra-fields>
          <small class="text-muted">Public hostname or IP used by clients to connect</small>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">DNS Servers *</label>
            <form-tags-field
              [formField]="settingsForm.dns_servers"
              label="DNS Servers"
              [selectOptions]="settingsForm.dns_servers().value()"
            ></form-tags-field>
            <form-extra-fields [fieldRef]="settingsForm.dns_servers" class="form-error"></form-extra-fields>
            <small class="text-muted">Comma-separated DNS addresses</small>
          </div>
          <div class="form-group">
            <label class="form-label">MTU (optional)</label>
            <input type="number" class="form-control" [formField]="settingsForm.mtu" placeholder="1420" />
            <form-extra-fields [fieldRef]="settingsForm.mtu" class="form-error"></form-extra-fields>
            <small class="text-muted">Leave empty to use WireGuard default</small>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Persistent Keepalive (seconds)</label>
            <input type="number" [formField]="settingsForm.persistent_keepalive" class="form-control" />
            <form-extra-fields [fieldRef]="settingsForm.persistent_keepalive" class="form-error"></form-extra-fields>
            <small class="text-muted">Leave empty to disable keepalive</small>
          </div>
        </div>
      </div>

      <div class="config-card">
        <h2 class="section-title"><i class="bi bi-tools me-2"></i>Maintenance</h2>
        <div class="form-check">
          <input
            type="checkbox"
            [formField]="settingsForm.maintenance_mode"
            class="form-check-input"
            id="maintenance"
          />
          <label class="form-check-label" for="maintenance">
            Enable maintenance mode
            <small class="d-block text-muted">Non-admin users will see a maintenance page</small>
          </label>
        </div>
      </div>

      <div class="form-actions">
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="settingsForm().invalid() || settingsForm().submitting()"
        >
          @if (settingsForm().submitting()) {
            <span class="spinner-border spinner-border-sm me-1"></span>
          }
          <i class="bi bi-floppy me-1"></i>Save Settings
        </button>
        <button
          type="button"
          class="btn btn-outline-danger"
          [disabled]="resetting() || settingsForm().submitting()"
          (click)="resetSettings()"
        >
          @if (resetting()) {
            <span class="spinner-border spinner-border-sm me-1"></span>
          }
          <i class="bi bi-arrow-counterclockwise me-1"></i>Reset Settings
        </button>
      </div>
    </form>
  }
</div>
