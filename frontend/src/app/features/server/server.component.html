<!-- Server configuration page - admin only -->
<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-title"><i class="bi bi-hdd-stack-fill me-2"></i>Server Configuration</h1>
      <p class="page-subtitle">WireGuard interface settings and service control</p>
    </div>
    <!-- Service controls -->
    <div class="service-controls">
      @if (status() === false) {
        <button
          class="btn btn-sm btn-outline-success"
          [disabled]="serviceActionLoading() !== null"
          (click)="controlService('start')"
        >
          @if (serviceActionLoading() === "start") {
            <span class="spinner-border spinner-border-sm me-1"></span>
          } @else {
            <i class="bi bi-play-fill me-1"></i>
          }
          Start
        </button>
      } @else {
        <button
          class="btn btn-sm btn-outline-warning"
          [disabled]="serviceActionLoading() !== null"
          (click)="controlService('stop')"
        >
          @if (serviceActionLoading() === "stop") {
            <span class="spinner-border spinner-border-sm me-1"></span>
          } @else {
            <i class="bi bi-stop-fill me-1"></i>
          }
          Stop
        </button>
        <button
          class="btn btn-sm btn-outline-info"
          [disabled]="serviceActionLoading() !== null"
          (click)="controlService('restart')"
        >
          @if (serviceActionLoading() === "restart") {
            <span class="spinner-border spinner-border-sm me-1"></span>
          } @else {
            <i class="bi bi-arrow-repeat me-1"></i>
          }
          Restart
        </button>
      }
    </div>
  </div>

  <div-error [errorRef]="error()" [successRef]="successMessage()"></div-error>

  @if (loading()) {
    <div class="loading-state">
      <div class="spinner-border text-primary" role="status"></div>
      <p>Loading configuration...</p>
    </div>
  } @else {
    <form [formRoot]="serverForm" class="config-form">
      <div class="config-card">
        <h2 class="section-title"><i class="bi bi-ethernet me-2"></i>Interface</h2>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Network Address (CIDR) *</label>
            <input type="text" class="form-control" [formField]="serverForm.address" placeholder="192.168.1.0/24" />
            <form-extra-fields [fieldRef]="serverForm.address"></form-extra-fields>
          </div>
          <div class="form-group">
            <label class="form-label">Listen Port *</label>
            <input type="number" class="form-control" [formField]="serverForm.listen_port" placeholder="51820" />
            <form-extra-fields [fieldRef]="serverForm.listen_port"></form-extra-fields>
          </div>
        </div>

        <div class="form-group">
          <div class="d-flex align-items-center justify-content-between mb-1">
            <label class="form-label mb-0">Key Pair</label>
            <button type="button" class="btn btn-sm btn-outline-primary" (click)="generateKeypair()">
              <i class="bi bi-key-fill me-1"></i>Generate Key Pair
            </button>
          </div>
          <div class="form-row">
            <div class="form-group mb-0">
              <label class="form-label">Private Key *</label>
              <div class="input-group">
                <input
                  [type]="showPrivateKey() ? 'text' : 'password'"
                  class="form-control font-mono"
                  [class.is-warning]="!serverForm.private_key().value()"
                  [formField]="serverForm.private_key"
                  placeholder="Server private key"
                />
                <form-extra-fields [fieldRef]="serverForm.private_key"></form-extra-fields>
                <button type="button" class="btn btn-outline-secondary" (click)="showPrivateKey.update((v) => !v)">
                  <i class="bi" [class.bi-eye]="!showPrivateKey()" [class.bi-eye-slash]="showPrivateKey()"></i>
                </button>
              </div>
            </div>
            <div class="form-group mb-0">
              <label class="form-label">Public Key *</label>
              <input
                type="text"
                class="form-control font-mono"
                [class.is-warning]="!serverForm.public_key().value()"
                [formField]="serverForm.public_key"
                placeholder="Server public key"
              />
            </div>
          </div>
        </div>
      </div>

      <div class="config-card">
        <h2 class="section-title"><i class="bi bi-terminal me-2"></i>Post-Up / Post-Down Scripts</h2>
        <div class="form-group">
          <label class="form-label">PostUp</label>
          <textarea
            class="form-control font-mono"
            rows="3"
            placeholder="EXT_IF=$(ip route show default | awk '/default/ {print $5; exit}'); iptables -A FORWARD -i wg0 -o $EXT_IF -j ACCEPT; iptables -A FORWARD -i $EXT_IF -o wg0 -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT; iptables -t nat -A POSTROUTING -o $EXT_IF -j MASQUERADE"
            [formField]="serverForm.postup"
          ></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">PostDown</label>
          <textarea
            class="form-control font-mono"
            rows="3"
            placeholder="EXT_IF=$(ip route show default | awk '/default/ {print $5; exit}'); iptables -D FORWARD -i wg0 -o $EXT_IF -j ACCEPT; iptables -D FORWARD -i $EXT_IF -o wg0 -m conntrack --ctstate RELATED,ESTABLISHED -j ACCEPT; iptables -t nat -D POSTROUTING -o $EXT_IF -j MASQUERADE"
            [formField]="serverForm.postdown"
          ></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" [disabled]="serverForm().invalid() || serverForm().submitting()">
          @if (serverForm().submitting()) {
            <span class="spinner-border spinner-border-sm me-1"></span>
          }
          <i class="bi bi-floppy me-1"></i>Save Configuration
        </button>
        <button
          type="button"
          class="btn btn-outline-danger"
          [disabled]="resetting() || serverForm().submitting()"
          (click)="resetServerConfig()"
        >
          @if (resetting()) {
            <span class="spinner-border spinner-border-sm me-1"></span>
          }
          <i class="bi bi-arrow-counterclockwise me-1"></i>Reset Configuration
        </button>
        <button
          type="button"
          class="btn btn-warning"
          [disabled]="applying() || serverForm().submitting()"
          (click)="applyConfig()"
        >
          @if (applying()) {
            <span class="spinner-border spinner-border-sm me-1"></span>
          }
          <i class="bi bi-lightning-fill me-1"></i>Apply & Restart
        </button>
      </div>
    </form>
  }
</div>
