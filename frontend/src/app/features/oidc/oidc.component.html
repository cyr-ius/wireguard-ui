<div class="page-container">
  <div class="page-header">
    <div>
      <h1 class="page-title"><i class="bi bi-shield-lock me-2"></i>OIDC Connector</h1>
      <p class="page-subtitle">Configure OpenID Connect SSO parameters for your identity provider</p>
    </div>
  </div>

  <div-error [errorRef]="error()" [successRef]="successMessage()"></div-error>

  @if (loading()) {
    <div class="loading-state">
      <div class="spinner-border text-primary" role="status"></div>
      <p>Loading OIDC configuration...</p>
    </div>
  } @else {
    <form [formRoot]="oidcForm" class="config-form">
      <div class="config-card">
        <h2 class="section-title"><i class="bi bi-sliders me-2"></i>Connector</h2>
        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="oidcEnabled" [formField]="oidcForm.enabled" />
          <label class="form-check-label" for="oidcEnabled"> Enable OIDC authentication </label>
        </div>

        <div class="form-group">
          <label class="form-label">Issuer URL</label>
          <input
            type="text"
            class="form-control"
            [formField]="oidcForm.issuer"
            placeholder="https://idp.example.com/realms/main"
          />

          <small class="text-muted">
            Base issuer used for discovery at
            <code>/.well-known/openid-configuration</code>
          </small>

          <form-extra-fields [fieldRef]="oidcForm.issuer" class="form-error"></form-extra-fields>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Client ID</label>
            <input type="text" class="form-control" [formField]="oidcForm.client_id" placeholder="wireguard-ui" />
            <form-extra-fields [fieldRef]="oidcForm.client_id" class="form-error"></form-extra-fields>
          </div>
          <div class="form-group">
            <label class="form-label">Client Secret</label>
            <input type="password" class="form-control" [formField]="oidcForm.client_secret" placeholder="••••••••" />
            <form-extra-fields [fieldRef]="oidcForm.client_secret" class="form-error"></form-extra-fields>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Redirect URI</label>
            <input
              type="text"
              class="form-control"
              [formField]="oidcForm.redirect_uri"
              placeholder="https://your-ui/auth/callback"
            />
            <form-extra-fields [fieldRef]="oidcForm.redirect_uri" class="form-error"></form-extra-fields>
          </div>
          <div class="form-group">
            <label class="form-label">Post Logout Redirect URI</label>
            <input
              type="text"
              class="form-control"
              [formField]="oidcForm.post_logout_redirect_uri"
              placeholder="https://your-ui/login"
            />
            <form-extra-fields [fieldRef]="oidcForm.post_logout_redirect_uri" class="form-error"></form-extra-fields>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Response Type</label>
            <input type="text" class="form-control" [formField]="oidcForm.response_type" placeholder="code" />
            <form-extra-fields [fieldRef]="oidcForm.response_type" class="form-error"></form-extra-fields>
          </div>
          <div class="form-group">
            <label class="form-label">Scope</label>
            <input type="text" class="form-control" [formField]="oidcForm.scope" placeholder="openid profile email" />
            <form-extra-fields [fieldRef]="oidcForm.scope" class="form-error"></form-extra-fields>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="oidcForm().invalid() || oidcForm().submitting()"
          [aria-busy]="oidcForm().submitting()"
        >
          @if (oidcForm().submitting()) {
            <span class="spinner-border spinner-border-sm me-1"></span>
          }
          <i class="bi bi-floppy me-1"></i>Save OIDC Settings
        </button>
        <button
          type="button"
          class="btn btn-outline-danger"
          [disabled]="resetting() || oidcForm().submitting()"
          (click)="reset()"
        >
          @if (resetting()) {
            <span class="spinner-border spinner-border-sm me-1"></span>
          }
          <i class="bi bi-arrow-counterclockwise me-1"></i>Reset Settings
        </button>
      </div>
    </form>
  }
</div>
